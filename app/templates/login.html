<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProFinder - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cor-primaria: #298e94; 
            --cor-primaria-hover: #22767c;
            --cor-texto-escuro: #2c3e50;
            --cor-borda-input: #298e94;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--cor-primaria);
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        .header-cadastro {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .btn-header {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            font-size: 1.1rem;
            transition: opacity 0.3s ease;
        }

        .btn-header:hover {
            opacity: 0.8;
            color: white;
        }

        .btn-header i {
            font-size: 1.3rem;
        }

        .btn-ajuda {
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 8px 20px;
            border-radius: 30px;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-cadastro {
            background-color: #fcfbfc;
            border-radius: 12px;
            padding: 50px 50px; 
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            transform: translateY(-30px); 
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-area img {
            height: 75px; 
            margin-bottom: 10px;
        }

        .titulo-card {
            color: var(--cor-primaria);
            font-weight: 700;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-control-custom {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 22px; 
            border: 2px solid var(--cor-borda-input);
            border-radius: 0px; 
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            color: var(--cor-primaria);
            outline: none;
            transition: all 0.3s;
        }

        .form-control-custom::placeholder {
            color: var(--cor-primaria);
            opacity: 0.8;
        }

        .form-control-custom:focus {
            border-color: var(--cor-primaria-hover);
            box-shadow: 0 0 0 0.2rem rgba(41, 142, 148, 0.25);
        }

        .password-container {
            position: relative;
            width: 100%;
        }

        .password-container .form-control-custom {
            padding-right: 45px; 
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 14px;
            cursor: pointer;
            color: var(--cor-primaria);
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: var(--cor-primaria-hover);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--cor-primaria);
            color: white;
            font-weight: 600;
            padding: 12px;
            font-size: 1.1rem;
            border: none;
            border-radius: 6px; 
            margin-top: 10px;
            margin-bottom: 30px;
            transition: background-color 0.3s;
        }

        .btn-submit:hover {
            background-color: var(--cor-primaria-hover);
        }

        .links-inferiores {
            text-align: center;
            font-size: 0.95rem;
            color: var(--cor-primaria);
            font-weight: 500;
        }

        .links-inferiores a {
            color: var(--cor-primaria);
            text-decoration: underline;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .links-inferiores a:hover {
            opacity: 0.7;
        }

        .esqueceu-senha {
            display: block;
            text-align: right;
            margin-top: -15px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--cor-primaria);
            text-decoration: none;
        }
        
        .esqueceu-senha:hover {
            text-decoration: underline;
        }

        .erro-alerta {
            color: #e74c3c;
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: -10px;
            margin-bottom: 20px;
            text-align: center;
        }

        @media (max-width: 576px) {
            body {
                height: auto;
                overflow: auto; 
            }
            .header-cadastro {
                padding: 15px 20px;
            }
            .btn-header span {
                display: none; 
            }
            .card-cadastro {
                padding: 40px 25px;
                border-radius: 8px;
                transform: translateY(0);
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>

    <header class="header-cadastro">
        <a href="{{ url_for('index') }}" class="btn-header">
            <i class="bi bi-chevron-left"></i>
            <span>Voltar para Home</span>
        </a>
        <a href="{{ url_for('ajuda') }}" class="btn-header btn-ajuda">
            <i class="bi bi-info-circle"></i>
            <span>Ajuda</span>
        </a>
    </header>


    <main class="main-container">
        <div class="card-cadastro">
            
            <div class="logo-area">
                <img src="{{ url_for('static', filename='img/image_18.png') }}" alt="Logo ProFinder">
                <h1 class="titulo-card">Boas Vindas!</h1>
            </div>

            <form action="{{ url_for('login') }}" method="POST">
                
                <input type="email" class="form-control-custom" name="email" placeholder="Digite seu E-mail:" required autocomplete="email">
                
                <div class="password-container">
                    <input type="password" class="form-control-custom" name="senha" id="senha" placeholder="Digite sua senha:" required>
                    <i class="bi bi-eye toggle-password" onclick="togglePassword('senha', this)"></i>
                </div>
                
                {% with messages = get_flashed_messages(category_filter=["danger"]) %}
                    {% if messages %}
                        {% for message in messages %}
                            <div class="erro-alerta">
                                <i class="bi bi-exclamation-circle me-1"></i> {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                
                <a href="#" class="esqueceu-senha">Esqueceu a senha?</a>

                <button type="submit" class="btn-submit">Entrar</button>
                
            </form>

            <div class="links-inferiores">
                <a href="{{ url_for('cadastro_cliente') }}">Cadastrar Conta</a> 
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }
    </script>
</body>
</html>
